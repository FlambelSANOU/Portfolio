<body class="font-mono selection:bg-cyber-accent selection:text-black">

    <div class="scanlines"></div>

    <header class="sticky top-0 z-50 bg-cyber-bg/90 backdrop-blur-md border-b border-cyber-border">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="./index.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 border border-cyber-accent flex items-center justify-center bg-cyber-card">
                    <span class="text-cyber-accent font-bold text-lg group-hover:scale-110 transition-transform">FS</span>
                </div>
                <span class="text-white font-bold tracking-widest text-sm hidden sm:block">Flambel_SANOU</span>
            </a>
            <a href="./index.html#certifications"
                class="px-4 py-2 border border-cyber-accent text-cyber-accent text-xs font-bold uppercase tracking-wider hover:bg-cyber-accent hover:text-black transition-all">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </a>
        </div>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-6 py-12">
        <div id="certDetail" class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
            <div id="certImage" class="lg:col-span-5"></div>
            <div id="certInfo" class="lg:col-span-7 space-y-6"></div>
        </div>
        <div id="certError" class="hidden text-center py-20">
            <p class="text-cyber-danger text-lg" data-i18n-key="certNotFound">Certification not found.</p>
            <a href="./index.html#certifications"
                class="inline-block mt-6 px-6 py-3 border border-cyber-accent text-cyber-accent text-xs uppercase tracking-widest font-bold hover:bg-cyber-accent hover:text-black transition-all">
                <i class="fas fa-arrow-left mr-2"></i> Back to certifications
            </a>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-cyber-border bg-black/60 py-8 relative z-10 text-center text-xs text-cyber-muted">
        <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <p data-i18n="footer.credit">© 2026 Flambel SANOU</p>

                <a href="https://www.facebook.com/flambeljunior.kue/?locale=fr_FR" target="_blank" class="hover:text-cyber-accent"><i
                        class="fab fa-facebook fa-lg"></i></a>
            </div>
        </div>
    </footer>

    <script>
        const browserLang = (navigator.language || navigator.userLanguage || '').slice(0, 2);
        let currentLang = localStorage.getItem('portfolio-lang') || (browserLang === 'fr' ? 'fr' : 'en');

        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');

        async function loadCert() {
            if (!certId) {
                document.getElementById('certDetail').classList.add('hidden');
                document.getElementById('certError').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('./assets/data/distinctions.json');
                const data = await res.json();
                const cert = data.find(c => c.id === certId);

                if (!cert) {
                    document.getElementById('certDetail').classList.add('hidden');
                    document.getElementById('certError').classList.remove('hidden');
                    return;
                }

                renderCert(cert);
            } catch (e) {
                document.getElementById('certDetail').classList.add('hidden');
                document.getElementById('certError').classList.remove('hidden');
            }
        }

        function renderCert(cert) {
            const title = currentLang === 'en' ? cert.titleEn : cert.titleFr;
            const type = currentLang === 'en' ? cert.typeEn : cert.typeFr;
            const date = currentLang === 'en' ? cert.dateEn : cert.dateFr;
            const description = currentLang === 'en' ? cert.descriptionEn : cert.descriptionFr;
            const subTitle = currentLang === 'en' ? cert.subTitleEn : cert.subTitleFr;

            const imageContainer = document.getElementById('certImage');
            const hasImg = cert.imgUrl && cert.imgUrl.trim() !== '';
            imageContainer.innerHTML = hasImg
                ? `<img src="${cert.imgUrl}" alt="${title}" class="w-full h-auto object-contain border border-cyber-border">`
                : `<div class="w-full aspect-video border border-cyber-border bg-cyber-card flex items-center justify-center text-cyber-muted text-sm">${title}</div>`;

            const infoContainer = document.getElementById('certInfo');
            infoContainer.innerHTML = `
                <div>
                    <span class="px-3 py-1 border border-cyber-danger text-cyber-danger text-xs uppercase font-bold">${type}</span>
                </div>
                <h1 class="text-3xl font-black text-white leading-tight">${title}</h1>
                ${subTitle ? `<p class="text-cyber-accent text-sm">${subTitle}</p>` : ''}
                <div class="flex items-center gap-4 text-sm">
                    <span class="text-cyber-accent"><i class="fas fa-building mr-2"></i>${cert.provider}</span>
                    <span class="text-cyber-muted"><i class="fas fa-calendar-alt mr-2"></i>${date}</span>
                </div>
                <p class="text-cyber-muted text-sm leading-relaxed border-l-2 border-cyber-accent pl-4">${description}</p>
                ${cert.fileUrl && cert.fileUrl.trim() !== '' ? `
                <a href="${cert.fileUrl}" target="_blank"
                   class="inline-block px-6 py-3 bg-cyber-accent text-black font-bold text-sm uppercase tracking-wider hover:bg-white transition-all">
                    <i class="fas fa-download mr-2"></i> ${currentLang === 'en' ? 'Download PDF' : 'Télécharger le PDF'}
                </a>` : ''}
                <a href="./index.html#contact"
                    class="px-4 py-2 border border-cyber-accent text-cyber-accent text-xs font-bold uppercase tracking-wider hover:bg-cyber-accent hover:text-black transition-all"
                    data-i18n="nav.contact">
                    Contact_me
                </a>
            `;
        }

        loadCert();
    </script>

</body>
